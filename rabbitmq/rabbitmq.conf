## RabbitMQ 3.12 config — bounds the SCCAP work-queue volume so the
## rabbitmq mnesia volume cannot balloon if a worker is wedged
## (ADR-010 architectural extra A1). The `drop-head` overflow keeps
## the freshest scan submissions during pressure.
##
## Operators replace this file (or layer in their own) by editing
## the bind mount in docker-compose.yml.

## Load the definitions file containing the policy.
load_definitions = /etc/rabbitmq/definitions.json
