# Local pre-commit hooks. Install once with: pre-commit install
# Run on demand with: pre-commit run --all-files
#
# All `rev:` values are SHA-pinned per .agent/devsecops_playbook.md §9
# (supply chain). Tag in trailing comment for review intent.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 2c9f875913ee60ca25ce70243dc24d5b6415598c  # v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: 76e47323a83cd9795e4ff9a1de1c0d2eef610f17  # v0.11.11
    hooks:
      - id: ruff
        args: [--fix]
        files: ^src/

  - repo: https://github.com/psf/black
    rev: 8a737e727ac5ab2f1d4cf5876720ed276dc8dc4b  # 25.1.0
    hooks:
      - id: black
        files: ^src/

  - repo: https://github.com/gitleaks/gitleaks
    rev: a9e1950fe247fbb08817393121691474c55a6cfa  # v8.21.2
    hooks:
      - id: gitleaks
