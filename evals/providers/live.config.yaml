# Live provider snippet — referenced by the eval-live job in
# .github/workflows/evals.yml. Promptfoo's built-in `openai:`
# provider handles auth via OPENAI_API_KEY (a GitHub Actions
# repo secret); no custom JS is required, which keeps the
# information-disclosure surface minimal (threat-model G7 / #4).
#
# To run live locally:
#   OPENAI_API_KEY=sk-... npx promptfoo eval \
#     -c agents/generic_specialized/promptfooconfig.yaml \
#     --provider openai:gpt-4o-mini
#
# The actual live job in CI invokes this via `--provider` override.
provider:
  id: openai:gpt-4o-mini
  config:
    temperature: 0
    max_tokens: 1024
