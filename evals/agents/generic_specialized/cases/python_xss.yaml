# Synthetic case — DO NOT include real customer code (threat-model G8).
description: ValidationAgent detects XSS via unsanitised template render

vars:
  agent_name: ValidationAgent
  language: python
  vulnerability_patterns: |
    Pattern: XSS via Jinja `safe` filter on untrusted input.
    Anti-pattern: {{ user_input | safe }}
    Secure pattern: {{ user_input }}  (default escaping)
  secure_patterns: |
    Default-escape user input; only mark trusted, server-rendered HTML as safe.
  code_bundle: |
    @app.get("/profile")
    def profile(user: User = Depends(current_user)):
        return render_template_string("<h1>{{ name | safe }}</h1>", name=user.bio)

assert:
  - type: javascript
    value: "(function(){ const out=JSON.parse(output); return out.findings.length>0 && /xss|cross.site/i.test(out.findings[0].title) && (out.findings[0].severity==='High' || out.findings[0].severity==='Critical'); })()"
