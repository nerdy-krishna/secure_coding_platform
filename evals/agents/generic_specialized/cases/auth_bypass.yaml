# Synthetic case — DO NOT include real customer code (threat-model G8).
description: AuthenticationAgent flags route handlers missing auth dependency

vars:
  agent_name: AuthenticationAgent
  language: python
  vulnerability_patterns: |
    Pattern: FastAPI route handler without an auth dependency
    (e.g. `Depends(current_active_user)` / `Depends(current_superuser)`).
    Anti-pattern: @app.get("/admin/users") + def list_users(): ...
    Secure pattern: @app.get(...) + def list_users(user = Depends(current_superuser)): ...
  secure_patterns: |
    Every authenticated endpoint MUST take a `Depends(...)` returning
    the authenticated user; admin paths take `Depends(current_superuser)`.
  code_bundle: |
    @app.get("/admin/users")
    async def list_users():
        return await user_repo.list_all()

assert:
  - type: javascript
    value: "(function(){ const out=JSON.parse(output); return out.findings.length>0 && /auth|authoriz/i.test(out.findings[0].title) && (out.findings[0].severity==='High' || out.findings[0].severity==='Critical'); })()"
