# Synthetic case — DO NOT include real customer code (threat-model G8).
description: ValidationAgent detects SQL injection via Python f-string interpolation

vars:
  agent_name: ValidationAgent
  language: python
  vulnerability_patterns: |
    Pattern: SQL injection via string concatenation / f-string interpolation.
    Anti-pattern: cursor.execute(f"SELECT * FROM users WHERE id={user_id}")
    Secure pattern: cursor.execute("SELECT * FROM users WHERE id = %s", (user_id,))
  secure_patterns: |
    Use parameterised queries via the DB driver's placeholder syntax.
  code_bundle: |
    def get_user(user_id: str):
        cursor.execute(f"SELECT * FROM users WHERE id={user_id}")
        return cursor.fetchone()

assert:
  - type: javascript
    value: "(function(){ const out=JSON.parse(output); return out.findings.length>0 && /SQL.*injection/i.test(out.findings[0].title) && out.findings[0].severity==='Critical'; })()"
