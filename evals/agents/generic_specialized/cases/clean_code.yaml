# Synthetic case — DO NOT include real customer code (threat-model G8).
# Negative case: benign code MUST NOT trigger findings. Pins the
# false-positive rate at zero on the easy path; harder false-positive
# cases come in follow-up runs.
description: Benign pure function produces no findings

vars:
  agent_name: ValidationAgent
  language: python
  vulnerability_patterns: |
    No applicable patterns for this code path.
  secure_patterns: |
    Pure functions with no I/O / no user input have no security surface.
  code_bundle: |
    def add(a: int, b: int) -> int:
        """Return the sum of two integers."""
        return a + b

assert:
  - type: javascript
    value: "(function(){ const out=JSON.parse(output); return Array.isArray(out.findings) && out.findings.length===0; })()"
