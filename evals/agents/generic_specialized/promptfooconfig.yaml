# Promptfoo config — generic_specialized_agent (worker analyzer).
#
# The prompt template is extracted from `default_seed_service` by
# `scripts/extract_eval_prompts.py`; do not hand-edit. CI runs `--check`
# on every PR.
#
# Provider defaults to mock (free, deterministic). Live runs override
# via `--provider openai:gpt-4o-mini` from the workflow_dispatch path
# (see `.github/workflows/evals.yml`).

description: SCCAP generic_specialized_agent — analysis prompt regression suite

prompts:
  - id: quick_audit
    raw: file://prompts/quick_audit.txt

providers:
  - id: file://../../providers/mock.js
    label: mock

defaultTest:
  options:
    cache: true
  assert:
    - type: is-json
    - type: javascript
      value: "typeof JSON.parse(output).findings !== 'undefined'"

tests: file://cases/*.yaml
