# Promptfoo config — chat_agent (advisor flow).
#
# The prompt template is extracted from `default_seed_service` by
# `scripts/extract_eval_prompts.py`; do not hand-edit.

description: SCCAP chat_agent — advisor prompt regression suite

prompts:
  - id: chat
    raw: file://prompts/chat.txt

providers:
  - id: file://../../providers/mock.js
    label: mock

defaultTest:
  options:
    cache: true
  assert:
    - type: is-json
    - type: javascript
      value: "typeof JSON.parse(output).response === 'string'"

tests: file://cases/*.yaml
