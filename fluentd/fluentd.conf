# --- SYSTEM: bounded buffer + drop_oldest_chunk emits ERROR-level
# events that are then routed to fluentd's own stdout (ADR-010 P3-R1).
<system>
  log_level info
</system>

# --- SOURCE: Listen for logs from Docker containers ---
<source>
  @type forward
  port 24224
  bind 0.0.0.0
</source>

# --- PRE-PROCESS: Extract basic metadata from Tag ---
# Tag format: docker.<service_name>.<container_name>
# We set a default service_name and level here.
<filter docker.**>
  @type record_transformer
  enable_ruby
  <record>
    service_name ${tag_parts[1]}
    level "INFO"
  </record>
</filter>

# --- FILTER: Parse JSON if possible, fallback into 'message' ---
# `emit_invalid_record_to_error false` + `ignore_key_not_exist true`
# silence the per-event ArgumentError warns for sources that already
# emit structured records without a `log` key (e.g. the disk-monitor
# df-emitter posting straight to fluentd:24224). Their fields pass
# through `reserve_data true`.
<filter docker.**>
  @type parser
  key_name log
  reserve_data true
  remove_key_name_field true
  ignore_key_not_exist true
  emit_invalid_record_to_error false
  <parse>
    @type multi_format
    <pattern>
      format json
    </pattern>
    <pattern>
      format none
      message_key message
    </pattern>
  </parse>
</filter>

# --- MATCH: Forward logs to Grafana Loki ---
<match docker.**>
  @type loki
  @log_level info

  # Loki connection
  url "http://loki:3100"

  # Extract structured labels from the JSON log fields
  <label>
    service_name
    level
    logger_name
  </label>

  # Buffer settings (ADR-010 P3): bounded so a sustained Loki outage
  # cannot fill the host disk. drop_oldest_chunk is intentional log
  # loss; the BUFFER_OVERFLOW signal below makes the drop visible.
  <buffer>
    @type file
    path /fluentd/log/buffer
    flush_interval 5s
    retry_max_times 600
    retry_type periodic
    total_limit_size 2GB
    overflow_action drop_oldest_chunk
  </buffer>
</match>

# --- ERROR LABEL: surface fluentd's own internal errors as a
# greppable BUFFER_OVERFLOW event in Loki (ADR-010 P3-R1).
# fluentd routes its own internal-error events to the @ERROR label
# automatically when overflow_action drop_oldest_chunk fires.
<label @ERROR>
  <filter **>
    @type record_transformer
    enable_ruby
    <record>
      service_name "fluentd-internal"
      level "ERROR"
      event ${record["message"].to_s.match?(/BufferOverflowError|drop_oldest_chunk|chunk bytes limit exceeds/) ? "BUFFER_OVERFLOW" : "INTERNAL_ERROR"}
    </record>
  </filter>
  <match **>
    @type stdout
  </match>
</label>
