rules:
  - id: javascript-innerhtml-xss
    languages: [javascript, typescript]
    severity: ERROR
    message: >
      Setting innerHTML directly with user-controlled data can lead to XSS.
    metadata:
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation"
      owasp:
        - "A03:2021 - Injection"
      category: security
      confidence: HIGH
    pattern: $EL.innerHTML = $INPUT
