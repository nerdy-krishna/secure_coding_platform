rules:
  - id: python-sql-injection
    languages: [python]
    severity: ERROR
    message: >
      Possible SQL injection via string interpolation. Use parameterized queries.
    metadata:
      cwe:
        - "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp:
        - "A03:2021 - Injection"
      category: security
      confidence: HIGH
    pattern: |
      cursor.execute("..." % ...)
