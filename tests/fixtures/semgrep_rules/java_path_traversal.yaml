rules:
  - id: java-path-traversal
    languages: [java]
    severity: ERROR
    message: >
      User-controlled path used in file operations — possible path traversal.
    metadata:
      cwe:
        - "CWE-22: Improper Limitation of a Pathname to a Restricted Directory"
      owasp:
        - "A01:2021 - Broken Access Control"
      category: security
      confidence: HIGH
      impact: HIGH
      likelihood: MEDIUM
    pattern: new File($USER_INPUT)
