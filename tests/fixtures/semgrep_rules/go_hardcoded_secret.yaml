rules:
  - id: go-hardcoded-secret
    languages: [go]
    severity: WARNING
    message: >
      Hardcoded secret or password detected. Use environment variables or a secrets manager.
    metadata:
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      category: security
      confidence: MEDIUM
    pattern-either:
      - pattern: |
          $KEY := "..."
      - pattern: |
          password = "..."
