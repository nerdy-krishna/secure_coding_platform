rules:
  - id: python-shell-true
    languages: [python]
    severity: WARNING
    message: >
      subprocess called with shell=True; avoid passing user-controlled data.
    metadata:
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command"
      category: security
      confidence: MEDIUM
      technology:
        - python
    pattern: subprocess.call(..., shell=True)
