server {
    listen 80 default_server;
    server_name _;
    
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name _;

    # V15.3.4 — Trust only the local docker bridge for real-IP extraction
    real_ip_header X-Forwarded-For;
    set_real_ip_from 127.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;

    ssl_certificate /etc/letsencrypt/live/__SSL_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__SSL_DOMAIN__/privkey.pem;

    # SSL Recommended Defaults
    ssl_session_cache shared:le_nginx_SSL:10m;
    ssl_session_timeout 1440m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_ecdh_curve X25519:secp384r1;

    # V12.1.4 — OCSP stapling for efficient revocation checking
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/__SSL_DOMAIN__/chain.pem;

    root /usr/share/nginx/html;
    index index.html;

    # The Vite build emits content-hashed JS/CSS bundles plus a single
    # index.html that always references the latest hashes. If the
    # browser caches index.html, the user keeps loading the OLD
    # bundle even after a redeploy. Force every navigation to validate
    # against the server. Hashed assets stay cacheable for a year.
    location = / {
        limit_req zone=spa_zone burst=200 nodelay;
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files /index.html =404;
    }
    location = /index.html {
        limit_req zone=spa_zone burst=200 nodelay;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    # Hashed JS/CSS/font/image bundles — immutable by content hash.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, no-transform" always;
    }

    location / {
        # V2.4.1 — rate-limit SPA; requires limit_req_zone $binary_remote_addr zone=spa_zone:10m rate=60r/s; in http{} (nginx.conf)
        limit_req zone=spa_zone burst=200 nodelay;
        try_files $uri $uri/ /index.html;
    }

    resolver 127.0.0.11 valid=30s;

    location /api/v1/ {
        # V2.4.1 — rate-limit API; requires limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s; in http{} (nginx.conf)
        limit_req zone=api_zone burst=60 nodelay;
        set $backend "http://app:8000";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        # V14.2.5 / V14.3.2 — prevent caching of authenticated API responses
        add_header Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
    }
}
