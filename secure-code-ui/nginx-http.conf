upstream app_backend {
    server app:8000;
}

limit_req_zone $binary_remote_addr zone=api_zone:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=spa_zone:10m rate=120r/s;

server {
    listen 80 default_server;
    server_name _;

    server_tokens off;

    real_ip_header X-Forwarded-For;
    set_real_ip_from 127.0.0.0/8;

    if ($request_method = TRACE) {
        return 405;
    }

    root /usr/share/nginx/html;
    index index.html;

    # Allow Let's Encrypt to verify domain ownership
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    # Deny VCS metadata directories (V13.4.1)
    location ~ /\.(git|svn|hg|bzr) {
        deny all;
        return 404;
    }

    # Deny sensitive file extensions (V13.2.5)
    location ~* \.(env|ini|conf|key|pem|sql|bak|swp|log)$ {
        return 404;
    }

    # Deny monitoring/diagnostic paths (V13.4.5)
    location = /metrics {
        return 404;
    }

    # Serve the React application fallback (will be replaced by HTTPS config later)
    location / {
        limit_req zone=spa_zone burst=200 nodelay;
        try_files $uri $uri/ /index.html;
    }

    resolver 127.0.0.11 valid=30s;
    
    # Proxy API requests to backend
    location /api/v1/ {
        limit_req zone=api_zone burst=60 nodelay;

        proxy_pass http://app_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Proxy timeouts (V13.1.3)
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_next_upstream_timeout 0;
        proxy_next_upstream_tries 1;

        # Anti-caching for authenticated API responses (V14.2.5, V14.3.2)
        add_header Cache-Control "no-store" always;
        add_header Pragma "no-cache" always;
    }
}
