name: SCCAP Evals

on:
  pull_request:
    branches: [main]
    paths:
      - "evals/**"
      - "scripts/extract_eval_prompts.py"
      - "src/app/core/services/default_seed_service.py"
      - "src/app/infrastructure/agents/**"
      - ".github/workflows/evals.yml"
  workflow_dispatch:
    inputs:
      mode:
        description: "mock (free, deterministic) or live (real LLM, ~1-2¢)"
        type: choice
        options: [mock, live]
        default: mock

# Minimum-scope token (threat-model G1). Do NOT add `pull-requests: write`,
# `id-token: write`, or `actions: write` here — fork PRs would inherit them
# and a malicious dependency bump could push commits / comment / impersonate.
permissions:
  contents: read

# Cancel superseded runs on the same ref so PRs don't queue up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Disable Promptfoo's anonymous telemetry phone-home. The payload itself
# carries no prompts or API keys, but suppressing it removes an outbound
# HTTPS call from a job that has OPENAI_API_KEY in scope (live mode) and
# eliminates one upstream-Promptfoo-compromise side channel. (security
# review F1.)
env:
  PROMPTFOO_DISABLE_TELEMETRY: "1"

jobs:
  extract-check:
    name: Prompt-drift check (extract --check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install "poetry==1.8.3"
      - name: Install dependencies (no test/dev groups)
        # We only need enough to import default_seed_service at module
        # load. The full test+worker dep tree is overkill here.
        run: poetry install --no-interaction --no-ansi --no-root --without dev
      - name: Run prompt drift check (G6)
        run: poetry run python scripts/extract_eval_prompts.py --check

  mock-provider-grep:
    name: Mock provider sandbox check (G7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Grep mock provider for forbidden tokens
        # Threat-model G7: the mock provider MUST NOT use process.env,
        # fetch, http, https, child_process, or fs.write* — a tampered
        # mock should not be able to exfiltrate secrets, open sockets,
        # or write to disk. CI fails if any token appears.
        run: |
          set -e
          if grep -E '(process\.env|\bfetch\b|require\(.(child_process|http|https).\)|fs\.write)' evals/providers/mock.js; then
            echo "::error::evals/providers/mock.js uses a forbidden token (G7)"
            exit 1
          fi
          echo "G7 sandbox check: OK"

  eval-mock:
    name: Eval (mock provider)
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'mock') }}
    needs: [extract-check, mock-provider-grep]
    defaults:
      run:
        working-directory: evals
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: evals/package-lock.json
      - name: Install deps (npm ci)
        run: npm ci
      - name: Run generic_specialized eval (mock)
        # Warn-only: fail the step's own status but don't block the PR.
        continue-on-error: true
        run: npx promptfoo eval -c agents/generic_specialized/promptfooconfig.yaml --no-progress-bar -o results/gs.json
      - name: Run chat eval (mock)
        continue-on-error: true
        run: npx promptfoo eval -c agents/chat/promptfooconfig.yaml --no-progress-bar -o results/chat.json
      - name: Upload eval results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: promptfoo-mock-results
          path: evals/results/
          if-no-files-found: warn

  eval-live:
    name: Eval (live provider — opt-in)
    runs-on: ubuntu-latest
    # Threat-model G3 + G10: only fires on explicit workflow_dispatch
    # with mode=live. Never auto-fires on a PR — fork PRs can't reach
    # OPENAI_API_KEY because the trigger gate excludes them.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'live' }}
    needs: [extract-check, mock-provider-grep]
    defaults:
      run:
        working-directory: evals
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: evals/package-lock.json
      - name: Install deps (npm ci)
        run: npm ci
      - name: Run generic_specialized eval (live, gpt-4o-mini)
        continue-on-error: true
        run: npx promptfoo eval -c agents/generic_specialized/promptfooconfig.yaml --provider openai:gpt-4o-mini --no-progress-bar -o results/gs-live.json
      - name: Run chat eval (live, gpt-4o-mini)
        continue-on-error: true
        run: npx promptfoo eval -c agents/chat/promptfooconfig.yaml --provider openai:gpt-4o-mini --no-progress-bar -o results/chat-live.json
      - name: Upload live eval results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: promptfoo-live-results
          path: evals/results/
          if-no-files-found: warn
