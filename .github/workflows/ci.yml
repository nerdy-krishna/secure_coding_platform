name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so PRs don't queue up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-backend:
    name: Backend lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tools
        # Only install the tools we need — skip the full poetry dep tree
        # (torch + transformers would take multiple minutes and aren't
        # needed for linting the source).
        run: pip install "ruff==0.11.11" "black==25.1.0"
      - name: ruff
        run: ruff check src
      - name: black --check
        run: black --check src

  lint-frontend:
    name: Frontend lint + build (eslint + vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: secure-code-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: secure-code-ui/package-lock.json
      - name: Install deps
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Vite build
        run: npm run build

  poetry-lock-check:
    name: poetry.lock drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install "poetry==1.8.3"
      - name: Verify lock file is in sync
        # `poetry check --lock` fails if the committed lock doesn't match
        # pyproject.toml. Previously the Dockerfile regenerated the lock
        # at build time, which papered over drift; this job now catches
        # it at PR time.
        run: poetry check --lock

  build-backend-images:
    name: Docker build (api + worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api stage
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: api
          # Don't push from PRs; just verify the image builds.
          push: false
          load: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
      - name: Build worker stage
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: worker
          push: false
          load: false
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max
