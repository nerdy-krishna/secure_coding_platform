name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so PRs don't queue up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-backend:
    name: Backend lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install lint tools
        # Only install the tools we need — skip the full poetry dep tree
        # (torch + transformers would take multiple minutes and aren't
        # needed for linting the source).
        run: pip install "ruff==0.11.11" "black==25.1.0"
      - name: ruff
        run: ruff check src
      - name: black --check
        run: black --check src

  lint-frontend:
    name: Frontend lint + build (eslint + vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: secure-code-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: secure-code-ui/package-lock.json
      - name: Install deps
        run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Vite build
        run: npm run build

  poetry-lock-check:
    name: poetry.lock drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install "poetry==1.8.3"
      - name: Verify lock file is in sync
        # `poetry check --lock` fails if the committed lock doesn't match
        # pyproject.toml. Previously the Dockerfile regenerated the lock
        # at build time, which papered over drift; this job now catches
        # it at PR time.
        run: poetry check --lock

  bandit:
    name: Bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install "bandit==1.7.9"
      - name: bandit
        run: bandit -r src -ll

  pip-audit:
    name: pip-audit (dependency CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry + pip-audit
        run: pip install "poetry==1.8.3" "pip-audit==2.7.3"
      - name: Export dependency requirements
        run: poetry export --without-hashes --format=requirements.txt --output=requirements-audit.txt
      - name: pip-audit
        run: pip-audit --strict --requirement requirements-audit.txt

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-backend-images:
    name: Docker build (api + worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api stage
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: api
          # Don't push from PRs; just verify the image builds.
          push: false
          load: false
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max
      - name: Build worker stage
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: worker
          push: false
          load: false
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max

  pytest:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: secure_coding_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      # Match the default docker-compose DB so tests hit the same schema
      # shape the app expects.
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: secure_coding_platform
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_HOST_ALEMBIC: localhost
      ASYNC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/secure_coding_platform
      # alembic/env.py drives migrations through create_async_engine(), so
      # this URL must use the async driver even though Alembic itself is sync.
      ALEMBIC_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/secure_coding_platform
      SECRET_KEY: test-secret-key-at-least-32-characters-long
      ENCRYPTION_KEY: zH6_8nNpMc7XxS3mLqJdRvKuBtYfGhWePk4AaCcTbEE=
      # Cost lookups stay offline in CI — no LiteLLM network.
      LITELLM_LOCAL_MODEL_COST_MAP: "True"
      # Skip SMTP / fluentd wiring the app lazy-initialises.
      RABBITMQ_HOST: localhost
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
      ALLOWED_ORIGINS: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Poetry
        run: pip install "poetry==1.8.3"
      - name: Install dependencies (with test group)
        run: |
          poetry install --no-interaction --no-ansi --no-root --without dev --with test
      - name: Run Alembic migrations
        run: poetry run alembic upgrade head
      - name: pytest
        run: poetry run pytest -xvs
